appId: dev.pivis.app
productName: Pi-Vis
directories:
  buildResources: resources
  output: release/${version}
files:
  - out/**/*
  - LICENSE
  - THIRD_PARTY_NOTICES.md
  - "!**/.vscode/*"
  - "!src/*"
  - "!electron.vite.config.{js,ts}"
  - "!{.eslintignore,.eslintrc.cjs,.prettierignore,.prettierrc.yaml,dev-app-update.yml,CHANGELOG.md,README.md}"
  - "!{.env,.env.*,.npmrc,pnpm-lock.yaml}"
  - "!{tsconfig,tsconfig.*}.json"
  - "!vite.*.{js,ts}"
  - "!{karma,rollup,webpack}.config.{js,ts}"
  - "!{.mocharc,.prettierrc}.{js,cjs,yml,yaml}"
asarUnpack:
  - resources/**
  # The pinned pi runtime must be real files: the SDK host is forked (possibly
  # under system Node) and pty spawns dist/cli.js directly — neither can read
  # inside app.asar.
  - node_modules/@earendil-works/**
  - out/resources/pi-session-host/**
  - out/main/session-search-worker.js
  - out/main/chunks/**
  - node_modules/@homebridge/node-pty-prebuilt-multiarch/**/*.node
  - node_modules/@homebridge/node-pty-prebuilt-multiarch/build/**
  - node_modules/proper-lockfile/**
  - node_modules/zod/**
mac:
  entitlements: build/entitlements.mac.plist
  entitlementsInherit: build/entitlements.mac.plist
  extendInfo:
    NSMicrophoneUsageDescription: Not required
    NSCameraUsageDescription: Not required
  category: public.app-category.developer-tools
  target:
    - target: dmg
      arch:
        - arm64
    - target: zip
      arch:
        - arm64
win:
  executableName: pi-vis
  target:
    - target: nsis
linux:
  target:
    - target: AppImage
    - target: snap
  category: Development
nsis:
  artifactName: ${name}-${version}-setup.${ext}
  shortcutName: ${productName}
  uninstallDisplayName: ${productName}
  createDesktopShortcut: always
